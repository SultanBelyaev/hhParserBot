<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HH AutoApply — Админка</title>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2d3348;
      --text: #e8eaf0; --muted: #8b92a8; --accent: #5b8def;
      --success: #3ecf8e; --warning: #f5a623; --danger: #ef5350;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    .app { max-width: 1000px; margin: 0 auto; padding: 32px 20px 64px; }
    h1 { font-size: 1.75rem; margin-bottom: 4px; }
    .subtitle { color: var(--muted); margin-bottom: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    .card h2 { font-size: 1.05rem; margin-bottom: 14px; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 500; }
    .badge.connected { background: rgba(62,207,142,.15); color: var(--success); }
    .badge.disconnected { background: rgba(239,83,80,.15); color: var(--danger); }
    .badge.running { background: rgba(91,141,239,.15); color: var(--accent); }
    .badge.completed { background: rgba(62,207,142,.15); color: var(--success); }
    .badge.draft, .badge.paused { background: rgba(139,146,168,.15); color: var(--muted); }
    .badge.failed { background: rgba(239,83,80,.15); color: var(--danger); }
    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; }
    .alert.success { background: rgba(62,207,142,.12); color: var(--success); border: 1px solid rgba(62,207,142,.25); }
    .alert.error { background: rgba(239,83,80,.12); color: var(--danger); border: 1px solid rgba(239,83,80,.25); }
    .alert.info { background: rgba(91,141,239,.12); color: var(--accent); border: 1px solid rgba(91,141,239,.25); }
    .hidden { display: none !important; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; }
    input, select { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.95rem; }
    textarea { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem; min-height: 120px; resize: vertical; font-family: inherit; line-height: 1.45; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid .full { grid-column: 1 / -1; }
    .btn { display: inline-flex; align-items: center; padding: 10px 16px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 500; cursor: pointer; margin-right: 8px; margin-top: 12px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: #222633; color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: rgba(239,83,80,.15); color: var(--danger); }
    .campaign { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 10px; cursor: pointer; }
    .campaign:hover, .campaign.active { border-color: var(--accent); }
    .campaign h3 { font-size: 1rem; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    .meta { font-size: 0.85rem; color: var(--muted); }
    .stats { display: flex; gap: 20px; margin-top: 10px; }
    .stat-val { font-size: 1.4rem; font-weight: 700; }
    .stat-lbl { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; }
    .sent .stat-val { color: var(--success); }
    .skipped .stat-val { color: var(--warning); }
    .failed .stat-val { color: var(--danger); }
    .progress { height: 6px; background: var(--border); border-radius: 3px; margin-top: 8px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); transition: width .3s; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; }
    th { color: var(--muted); font-weight: 500; }
    a { color: var(--accent); text-decoration: none; }
    .detail-grid { display: grid; gap: 8px; margin-top: 12px; }
    .detail-row { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center; font-size: 0.85rem; }
    .detail-bar-wrap { grid-column: 1 / -1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .detail-bar { height: 100%; border-radius: 3px; }
    .detail-bar.success { background: var(--success); }
    .detail-bar.skipped { background: var(--warning); }
    .detail-bar.error { background: var(--danger); }
    .overview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
    .overview-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
    .overview-item .val { font-size: 1.3rem; font-weight: 700; }
    .overview-item .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-tab { padding: 6px 12px; border-radius: 16px; border: 1px solid var(--border); background: var(--bg); color: var(--muted); cursor: pointer; font-size: 0.85rem; }
    .filter-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(91,141,239,.1); }
    .section-title { font-size: 0.95rem; font-weight: 600; margin: 16px 0 8px; }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } .overview-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <div class="app">
    <h1>HH AutoApply</h1>
    <p class="subtitle">Массовые автоотклики на hh.ru через парсинг</p>
    <div id="message" class="alert hidden"></div>

    <div class="card" id="auth-card">
      <h2>Аккаунт HH</h2>
      <span id="auth-badge" class="badge disconnected">Не подключён</span>
      <p id="auth-hint" class="meta" style="margin-top:10px"></p>
      <div id="auth-actions"></div>
      <div id="login-form" class="hidden" style="margin-top:14px; max-width:400px"></div>
    </div>

    <div id="main-content" class="hidden">
      <div class="card">
        <h2>Новая кампания</h2>
        <div class="grid">
          <div><label>Название</label><input id="new-name" placeholder="Python — Москва" /></div>
          <div><label>Лимит откликов</label><input id="new-limit" type="number" min="1" max="500" value="10" /></div>
          <div class="full"><label>Поисковый запрос</label><input id="new-query" placeholder="Python разработчик" /></div>
          <div class="full">
            <label>Сопроводительное письмо</label>
            <textarea id="new-cover-letter" placeholder="Текст для вакансий с обязательным сопроводительным"></textarea>
          </div>
          <div>
            <label>Регион</label>
            <select id="new-area">
              <option value="">Вся Россия</option>
              <option value="1">Москва</option>
              <option value="2">Санкт-Петербург</option>
              <option value="3">Екатеринбург</option>
              <option value="4">Новосибирск</option>
              <option value="88">Казань</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary" onclick="createCampaign()">Создать кампанию</button>
      </div>

      <div class="card">
        <h2>Кампании (<span id="campaign-count">0</span>)</h2>
        <div id="campaign-list"></div>
      </div>

      <div class="card hidden" id="stats-card">
        <h2>Статистика — <span id="stats-title"></span></h2>
        <div id="stats-content"></div>
      </div>

      <div class="card hidden" id="logs-card">
        <h2>Лог откликов — <span id="logs-title"></span></h2>
        <div class="filter-tabs" id="log-filters"></div>
        <table>
          <thead><tr><th>Статус</th><th>Вакансия</th><th>Причина</th><th>Сопроводительное</th><th>Время</th></tr></thead>
          <tbody id="logs-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API = "";
    let selectedId = null;
    let pollTimer = null;
    let logFilter = "all";

    async function api(path, opts = {}) {
      const res = await fetch(API + path, {
        headers: { "Content-Type": "application/json", ...opts.headers },
        ...opts,
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.detail || `HTTP ${res.status}`);
      }
      return res.json();
    }

    function showMsg(type, text) {
      const el = document.getElementById("message");
      el.className = `alert ${type}`;
      el.textContent = text;
      el.classList.remove("hidden");
    }

    const STATUS_LABELS = { draft: "Черновик", running: "Запущена", completed: "Завершена", paused: "Остановлена", failed: "Ошибка" };

    async function loadAuth() {
      const auth = await api("/api/auth/status");
      const badge = document.getElementById("auth-badge");
      const hint = document.getElementById("auth-hint");
      const actions = document.getElementById("auth-actions");
      const main = document.getElementById("main-content");

      if (auth.connected) {
        badge.className = "badge connected";
        badge.textContent = "Подключён";
        hint.textContent = "";
        actions.innerHTML = '<button class="btn btn-danger" onclick="disconnect()">Выйти</button>';
        main.classList.remove("hidden");
      } else {
        badge.className = "badge disconnected";
        badge.textContent = "Не подключён";
        hint.textContent = auth.message || "";
        actions.innerHTML = '<button class="btn btn-primary" onclick="startLogin()">Войти в аккаунт</button>';
        main.classList.add("hidden");
      }
      return auth;
    }

    let loginPoll = null;
    let lastLoginState = null;

    async function startLogin() {
      try {
        const res = await api("/api/auth/login/start", { method: "POST" });
        if (res.status === "error") {
          showMsg("error", res.message || "Ошибка входа");
          return;
        }
        showMsg("info", res.message || "Введите телефон и код ниже.");
        lastLoginState = null;
        renderLoginForm();
        if (loginPoll) clearInterval(loginPoll);
        loginPoll = setInterval(pollLogin, 1500);
      } catch (e) {
        showMsg("error", e.message);
      }
    }

    async function pollLogin() {
      const st = await api("/api/auth/login/status");
      if (st.state === lastLoginState) return;
      lastLoginState = st.state;

      if (st.state === "waiting_phone") renderPhoneForm();
      else if (st.state === "waiting_code") renderCodeForm();
      else if (st.state === "completed") {
        clearInterval(loginPoll);
        loginPoll = null;
        document.getElementById("login-form").classList.add("hidden");
        showMsg("success", "Вход выполнен!");
        loadAuth();
      } else if (st.state === "failed") {
        clearInterval(loginPoll);
        loginPoll = null;
        showMsg("error", st.error || "Ошибка входа");
      }
    }

    function renderLoginForm() {
      const form = document.getElementById("login-form");
      form.classList.remove("hidden");
      delete form.dataset.step;
      form.innerHTML = '<p class="meta">Инициализация браузера...</p>';
    }

    function renderPhoneForm() {
      const form = document.getElementById("login-form");
      form.classList.remove("hidden");
      if (form.dataset.step === "phone") return;
      form.dataset.step = "phone";
      form.innerHTML = `
        <label>Номер телефона</label>
        <input id="phone" placeholder="+7 999 123-45-67" autofocus />
        <button class="btn btn-primary" onclick="submitPhone()">Отправить</button>`;
    }

    function renderCodeForm() {
      const form = document.getElementById("login-form");
      form.classList.remove("hidden");
      if (form.dataset.step === "code") return;
      form.dataset.step = "code";
      form.innerHTML = `
        <label>Код из SMS</label>
        <input id="code" placeholder="1234" autofocus />
        <button class="btn btn-primary" onclick="submitCode()">Подтвердить</button>`;
    }

    async function submitPhone() {
      const phone = document.getElementById("phone").value.trim();
      if (!phone) return showMsg("error", "Введите номер телефона");
      const btn = document.querySelector("#login-form .btn-primary");
      if (btn) { btn.disabled = true; btn.textContent = "Отправка..."; }
      try {
        const res = await api("/api/auth/login/phone", { method: "POST", body: JSON.stringify({ phone }) });
        showMsg("info", res.message);
        lastLoginState = null;
        await pollLogin();
      } catch (e) {
        showMsg("error", e.message);
        if (btn) { btn.disabled = false; btn.textContent = "Отправить"; }
      }
    }

    async function submitCode() {
      const code = document.getElementById("code").value.trim();
      if (!code) return showMsg("error", "Введите код из SMS");
      const btn = document.querySelector("#login-form .btn-primary");
      if (btn) { btn.disabled = true; btn.textContent = "Проверка..."; }
      try {
        const res = await api("/api/auth/login/code", { method: "POST", body: JSON.stringify({ code }) });
        showMsg("info", res.message);
        lastLoginState = null;
        await pollLogin();
      } catch (e) {
        showMsg("error", e.message);
        if (btn) { btn.disabled = false; btn.textContent = "Подтвердить"; }
      }
    }

    async function disconnect() {
      await api("/api/auth/session", { method: "DELETE" });
      showMsg("success", "Сессия удалена");
      loadAuth();
    }

    async function loadCampaigns() {
      const campaigns = await api("/api/campaigns");
      document.getElementById("campaign-count").textContent = campaigns.length;
      const list = document.getElementById("campaign-list");

      if (!campaigns.length) {
        list.innerHTML = '<p class="meta">Создайте кампанию для начала автооткликов</p>';
        return campaigns;
      }

      list.innerHTML = campaigns.map(c => {
        const pct = Math.min(100, (c.processed_count / c.apply_limit) * 100);
        return `<div class="campaign ${selectedId === c.id ? 'active' : ''}" onclick="selectCampaign(${c.id})">
          <h3>${esc(c.name)} <span class="badge ${c.status}">${STATUS_LABELS[c.status] || c.status}</span></h3>
          <div class="meta">Запрос: «${esc(c.search_query)}» · Лимит: ${c.apply_limit} · Обработано: ${c.processed_count}/${c.apply_limit}</div>
          ${c.status === 'running' ? `<div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>` : ''}
          <div class="stats">
            <div class="sent"><div class="stat-val">${c.sent_count}</div><div class="stat-lbl">Отправлено</div></div>
            <div class="skipped"><div class="stat-val">${c.skipped_count}</div><div class="stat-lbl">Пропущено</div></div>
            <div class="failed"><div class="stat-val">${c.failed_count}</div><div class="stat-lbl">Ошибки</div></div>
          </div>
          ${c.error_message ? `<p style="color:var(--danger);font-size:.85rem;margin-top:8px">${esc(c.error_message)}</p>` : ''}
          <div onclick="event.stopPropagation()">
            ${c.status !== 'running' ? `<button class="btn btn-primary" onclick="startCampaign(${c.id})">${c.status === 'paused' ? 'Продолжить' : 'Запустить'}</button>` : ''}
            ${c.status === 'running' ? `<button class="btn btn-secondary" onclick="stopCampaign(${c.id})">Остановить</button>` : ''}
            ${c.status !== 'running' ? `<button class="btn btn-danger" onclick="deleteCampaign(${c.id})">Удалить</button>` : ''}
          </div>
        </div>`;
      }).join('');

      if (campaigns.some(c => c.status === 'running')) {
        if (!pollTimer) pollTimer = setInterval(() => {
          loadCampaigns().then(() => {
            if (selectedId) {
              loadStats(selectedId);
              loadLogs(selectedId);
            }
          });
        }, 3000);
      } else if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }

      return campaigns;
    }

    function formatDuration(seconds) {
      if (seconds == null) return "—";
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return m > 0 ? `${m} мин ${s} сек` : `${s} сек`;
    }

    async function loadStats(id) {
      const stats = await api(`/api/campaigns/${id}/stats`);
      const card = document.getElementById("stats-card");
      document.getElementById("stats-title").textContent = stats.campaign_name;

      const detailRows = stats.by_detail.map(d => `
        <div class="detail-row">
          <span>${esc(d.label)}</span>
          <span style="color:var(--muted)">${d.percent}%</span>
          <span>${d.count}</span>
          <div class="detail-bar-wrap"><div class="detail-bar ${d.status}" style="width:${d.percent}%"></div></div>
        </div>
      `).join('');

      document.getElementById("stats-content").innerHTML = `
        <div class="overview-grid">
          <div class="overview-item"><div class="val" style="color:var(--success)">${stats.rates.success}%</div><div class="lbl">Успешность</div></div>
          <div class="overview-item"><div class="val">${stats.vacancies_found ?? "—"}</div><div class="lbl">Найдено вакансий</div></div>
          <div class="overview-item"><div class="val">${stats.processed_count}/${stats.apply_limit}</div><div class="lbl">Обработано</div></div>
          <div class="overview-item"><div class="val">${formatDuration(stats.timing.duration_seconds)}</div><div class="lbl">Длительность</div></div>
        </div>
        <div class="stats">
          <div class="sent"><div class="stat-val">${stats.totals.sent}</div><div class="stat-lbl">Отправлено</div></div>
          <div class="skipped"><div class="stat-val">${stats.totals.skipped}</div><div class="stat-lbl">Пропущено</div></div>
          <div class="failed"><div class="stat-val">${stats.totals.failed}</div><div class="stat-lbl">Ошибки</div></div>
        </div>
        ${stats.timing.avg_seconds_per_item ? `<p class="meta" style="margin-top:10px">Среднее время на вакансию: ${stats.timing.avg_seconds_per_item} сек · Осталось: ${stats.remaining}</p>` : ''}
        ${detailRows ? `<div class="section-title">Разбивка по причинам</div><div class="detail-grid">${detailRows}</div>` : '<p class="meta" style="margin-top:12px">Пока нет данных — запустите кампанию</p>'}
      `;
      card.classList.remove("hidden");
      return stats;
    }

    function renderLogFilters(stats) {
      const filters = [
        { key: "all", label: `Все (${stats.totals.total})` },
        { key: "success", label: `Отправлено (${stats.totals.sent})` },
        { key: "skipped", label: `Пропущено (${stats.totals.skipped})` },
        { key: "error", label: `Ошибки (${stats.totals.failed})` },
      ];
      document.getElementById("log-filters").innerHTML = filters.map(f =>
        `<button class="filter-tab ${logFilter === f.key ? 'active' : ''}" onclick="setLogFilter('${f.key}', ${selectedId})">${f.label}</button>`
      ).join('');
    }

    function setLogFilter(filter, id) {
      logFilter = filter;
      loadLogs(id);
    }

    async function createCampaign() {
      const name = document.getElementById("new-name").value.trim();
      const search_query = document.getElementById("new-query").value.trim();
      const apply_limit = Number(document.getElementById("new-limit").value);
      const area_id = document.getElementById("new-area").value || null;
      const cover_letter = document.getElementById("new-cover-letter").value.trim() || null;
      if (!name || !search_query) return showMsg("error", "Заполните название и запрос");
      await api("/api/campaigns", { method: "POST", body: JSON.stringify({ name, search_query, apply_limit, area_id, cover_letter }) });
      showMsg("success", "Кампания создана");
      document.getElementById("new-name").value = "";
      document.getElementById("new-query").value = "";
      loadCampaigns();
    }

    async function startCampaign(id) {
      await api(`/api/campaigns/${id}/start`, { method: "POST" });
      showMsg("success", "Кампания запущена");
      selectedId = id;
      logFilter = "all";
      loadCampaigns();
      loadStats(id);
      loadLogs(id);
    }

    async function stopCampaign(id) {
      await api(`/api/campaigns/${id}/stop`, { method: "POST" });
      showMsg("info", "Кампания остановлена");
      loadCampaigns();
    }

    async function deleteCampaign(id) {
      await api(`/api/campaigns/${id}`, { method: "DELETE" });
      if (selectedId === id) {
        selectedId = null;
        document.getElementById("logs-card").classList.add("hidden");
        document.getElementById("stats-card").classList.add("hidden");
      }
      showMsg("success", "Кампания удалена");
      loadCampaigns();
    }

    async function selectCampaign(id) {
      selectedId = id;
      logFilter = "all";
      loadCampaigns();
      loadStats(id);
      loadLogs(id);
    }

    const DETAIL_LABELS = {
      sent: "Отклик отправлен",
      test_required: "Требуется тест",
      cover_letter_required: "Обязательное сопроводительное (не задано)",
      cover_letter_failed: "Не удалось отправить сопроводительное",
      extra_steps: "Дополнительные шаги",
      no_apply_button: "Нет кнопки отклика",
      card_not_found: "Карточка не найдена",
      timeout: "Таймаут",
      error: "Ошибка",
      unknown: "Неизвестный статус",
    };

    async function loadLogs(id) {
      const stats = await api(`/api/campaigns/${id}/stats`);
      renderLogFilters(stats);

      const params = new URLSearchParams({ limit: "200" });
      if (logFilter !== "all") params.set("status", logFilter);
      const logs = await api(`/api/campaigns/${id}/logs?${params}`);

      const card = document.getElementById("logs-card");
      document.getElementById("logs-title").textContent = stats.campaign_name;

      if (!logs.length && stats.totals.total === 0) {
        card.classList.add("hidden");
        return;
      }

      document.getElementById("logs-body").innerHTML = logs.length ? logs.map(l => `<tr>
        <td>${l.status === 'success' ? '✅' : l.status === 'skipped' ? '⏭' : '❌'}</td>
        <td><a href="https://hh.ru/vacancy/${l.vacancy_id}" target="_blank">${esc(l.vacancy_title || l.vacancy_id)}</a></td>
        <td style="color:var(--muted)">${esc(DETAIL_LABELS[l.detail] || l.detail)}</td>
        <td>${l.cover_letter_sent ? '<span style="color:var(--success)">Да</span>' : '<span style="color:var(--muted)">Нет</span>'}</td>
        <td style="color:var(--muted)">${new Date(l.created_at).toLocaleString('ru-RU')}</td>
      </tr>`).join('') : '<tr><td colspan="5" style="color:var(--muted)">Нет записей для выбранного фильтра</td></tr>';
      card.classList.remove("hidden");
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    async function loadDefaults() {
      try {
        const data = await api("/api/campaigns/meta/defaults");
        const el = document.getElementById("new-cover-letter");
        if (el && !el.value) el.value = data.default_cover_letter || "";
      } catch (_) {}
    }

    loadAuth().then(auth => {
      if (auth.connected) {
        loadDefaults();
        loadCampaigns();
      } else {
        loadDefaults();
      }
    });
  </script>
</body>
</html>
